<!DOCTYPE html>
<html>
<head>
  <title>AC Alternate Finder</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px; }
    input, button { padding:10px; margin:5px; }
    .card { background:#1e293b; padding:15px; border-radius:10px; margin:10px 0; }
    .recommended { color:#22c55e; }
    .compatible { color:#facc15; }
    .avoid { color:#ef4444; }
    .best { font-weight:bold; color:#38bdf8; }
  </style>
</head>

<body>

<h2>🔍 AC Alternate Finder</h2>

<input type="text" id="modelInput" placeholder="Enter Model (e.g. CS-EU12AKY3F)">
<button onclick="findAlternates()">Find</button>

<div id="results"></div>

<script>

// 🔹 Sample Data (replace with your full JSON later)
const models = [
  {idu:"CS-EU12AKY3F", tonnage:"1", category:"INV", series:"EU", star:"3", year:"2024", pipe_gas:"1/4", pipe_liquid:"3/8", cabinet:"SD", auto_cleaning:"X"},
  {idu:"CS-EU12CKY3FM", tonnage:"1", category:"INV", series:"EU", star:"3", year:"2026", pipe_gas:"1/4", pipe_liquid:"3/8", cabinet:"SD", auto_cleaning:"O"},
  {idu:"CS-AU12BKYF", tonnage:"1", category:"INV", series:"AU", star:"3", year:"2025", pipe_gas:"1/4", pipe_liquid:"3/8", cabinet:"SD", auto_cleaning:"X"},
  {idu:"CS-KU12AKY", tonnage:"1", category:"INV", series:"KU", star:"3", year:"2024", pipe_gas:"1/4", pipe_liquid:"3/8", cabinet:"SD", auto_cleaning:"X"}
];

// 🔹 Scoring Logic
function calculateScore(base, alt) {
  let score = 0;

  if (alt.year > base.year) score += 30;
  else if (alt.year == base.year) score += 20;
  else score -= 10;

  score += (alt.star - base.star) * 25;

  if (alt.series === base.series) score += 20;
  if (alt.cabinet === base.cabinet) score += 10;
  if (alt.auto_cleaning === base.auto_cleaning) score += 15;

  return score;
}

// 🔹 Classification
function classify(score) {
  if (score >= 60) return "recommended";
  if (score >= 30) return "compatible";
  return "avoid";
}

// 🔹 Main Function
function findAlternates() {
  const input = document.getElementById("modelInput").value.trim();
  const resultDiv = document.getElementById("results");
  resultDiv.innerHTML = "";

  const base = models.find(m => m.idu === input);

  if (!base) {
    resultDiv.innerHTML = "❌ Model not found";
    return;
  }

  const alternates = models.filter(m =>
    m.tonnage === base.tonnage &&
    m.category === base.category &&
    m.pipe_gas === base.pipe_gas &&
    m.pipe_liquid === base.pipe_liquid &&
    m.idu !== base.idu
  );

  const ranked = alternates.map(a => {
    const score = calculateScore(base, a);
    return { ...a, score, tag: classify(score) };
  }).sort((a,b)=>b.score-a.score);

  if (ranked.length > 0) ranked[0].best = true;

  // 🔹 Render
  ranked.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="${a.tag}">
        ${a.best ? "⭐ BEST | " : ""}
        ${a.idu}
      </div>
      <div>Year: ${a.year} | Series: ${a.series} | Score: ${a.score}</div>
    `;

    resultDiv.appendChild(div);
  });
}

</script>

</body>
</html>
