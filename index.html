<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panasonic AC – Alternate Model Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --card: #1a2235;
    --border: #1e3a5f;
    --accent: #0ea5e9;
    --accent2: #22d3ee;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --tag-bg: #1e3a5f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0f1e35 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px 0; }

  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .search-box label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .search-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    min-width: 220px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .tab-bar {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .tab-btn {
    background: none;
    border: none;
    padding: 7px 18px;
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .btn-search {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-search:hover { opacity: 0.85; }

  #results { margin-top: 8px; }

  .result-section {
    margin-bottom: 28px;
  }

  .section-header {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  .found-model-banner {
    background: linear-gradient(135deg, #0f2a1f, #0a1a2e);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .found-label {
    font-size: 0.7rem;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .found-model-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
  }

  .badge {
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-star { background: #783f04; color: #fcd34d; }
  .badge-year { background: var(--tag-bg); color: var(--accent2); }
  .badge-cabinet-sd { background: #1e3a5f; color: #93c5fd; }
  .badge-cabinet-pcm { background: #2d1b4e; color: #c4b5fd; }
  .badge-type { background: #064e3b; color: #6ee7b7; }
  .badge-tonnage { background: #1c2a1c; color: #86efac; }

  .alternates-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }

  .alt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
  }
  .alt-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .alt-card.newer { border-left: 3px solid var(--green); }
  .alt-card.same { border-left: 3px solid var(--accent); }
  .alt-card.older { border-left: 3px solid var(--muted); opacity: 0.75; }

  .alt-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .alt-model-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
  }

  .alt-odu-name {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .feat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .feat-item.highlighted { color: var(--text); font-weight: 500; }

  .feat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-yes { background: var(--green); }
  .dot-no { background: #334155; }
  .dot-highlight-yes { background: var(--accent2); box-shadow: 0 0 5px var(--accent2); }
  .dot-highlight-no { background: var(--red); }

  .rule-box {
    background: #0f1c2e;
    border: 1px solid #1e3a5f;
    border-left: 3px solid var(--orange);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .rule-box strong { color: var(--orange); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.95rem; }

  .notice {
    background: #1a2235;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .year-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .year-newer { background: #064e3b; color: #6ee7b7; }
  .year-same { background: #1e3a5f; color: #93c5fd; }
  .year-older { background: #292524; color: #a8a29e; }

  .odu-section { margin-top: 20px; }
  .odu-section-title {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .pipe-info {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .pipe-info span { background: var(--tag-bg); padding: 2px 8px; border-radius: 4px; }

  #notice-area {
    margin-bottom: 12px;
  }

  .no-match {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>

<header>
  <div>

      <button class="btn-search" onclick="doSearch()">FIND ALTERNATES</button>

  </div>

  <div id="results">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Enter a model number above to find compatible alternates</p>
    </div>
  </div>

</div>

let searchMode = 'all';

function setMode(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  searchMode = btn.dataset.mode;
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const raw = document.getElementById('searchInput').value.trim().toUpperCase();
  if (!raw) return;

  const res = document.getElementById('results');
  res.innerHTML = '';

  // Search IDU tables
  let iduMatches = [];
  if (searchMode === 'all' || searchMode === 'idu') {
    for (const tbl of DATA.idu_tables) {
      for (const m of tbl.models) {
        if (m.model.toUpperCase() === raw) {
          iduMatches.push({ model: m, table: tbl });
        }
      }
    }
  }

  // Search ODU tables
  let oduMatches = [];
  if (searchMode === 'all' || searchMode === 'odu') {
    for (const tbl of DATA.odu_tables) {
      for (const m of tbl.models) {
        if (m.idu.toUpperCase() === raw || m.odu.toUpperCase() === raw) {
          oduMatches.push({ model: m, table: tbl });
        }
      }
    }
  }

  // Search WAC tables
  let wacMatches = [];
  if (searchMode === 'all' || searchMode === 'wac') {
    for (const tbl of DATA.wac_tables) {
      for (const m of tbl.models) {
        if (m.model.toUpperCase() === raw) {
          wacMatches.push({ model: m, table: tbl });
        }
      }
    }
  }

  if (!iduMatches.length && !oduMatches.length && !wacMatches.length) {
    res.innerHTML = `<div class="no-match">No model found for <strong>${raw}</strong>. Check spelling or try without suffix (F, FM, etc.)</div>`;
    return;
  }

  // IDU Section
  if (iduMatches.length) {
    for (const { model: found, table } of iduMatches) {
      res.appendChild(renderIDUResult(found, table));
    }
  }

  // ODU Section
  if (oduMatches.length) {
    for (const { model: found, table } of oduMatches) {
      res.appendChild(renderODUResult(found, table));
    }
  }

  // WAC Section
  if (wacMatches.length) {
    for (const { model: found, table } of wacMatches) {
      res.appendChild(renderWACResult(found, table));
    }
  }
}

function yearClass(foundYear, altYear) {
  const f = parseInt(foundYear);
  const a = parseInt(altYear);
  if (isNaN(f) || isNaN(a)) return 'same';
  if (a >= f) return 'newer';
  return 'older';
}

function yearBadgeClass(cls) {
  if (cls === 'newer') return 'year-newer';
  if (cls === 'same') return 'year-same';
  return 'year-older';
}

function badge(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}

function cabinetBadge(cabinet) {
  return badge(cabinet, cabinet === 'SD' ? 'badge-cabinet-sd' : 'badge-cabinet-pcm');
}

// ---- IDU result renderer ----
function renderIDUResult(found, table) {
  const section = document.createElement('div');
  section.className = 'result-section';

  const IDU_FEATURES = [
    { key: 'temp_hidden', label: 'Hidden Display' },
    { key: 'temp_conv', label: 'Conv. Display' },
    { key: 'miraie', label: 'MirAIe 3.0' },
    { key: 'matter', label: 'Matter' },
    { key: 'nanoex', label: 'nanoeX' },
    { key: 'nanoe_g', label: 'nanoe-G' },
    { key: 'aqi', label: 'AQI Sensor' },
    { key: 'pm_filter', label: 'PM Filter' },
    { key: 'ag_clean', label: 'Ag Clean+' },
    { key: 'clean_mode', label: 'CLEAN Mode' },
    { key: 'aerowing', label: 'Aerowing' },
    { key: 'jet_stream', label: 'Jet Stream' },
    { key: 'powerful', label: 'Powerful' },
  ];

  // Highlighted features (green in original sheet)
  const HIGHLIGHTED = new Set(['temp_hidden','temp_conv','miraie','matter','nanoex','nanoe_g','aqi','pm_filter','ag_clean','clean_mode','aerowing','jet_stream','powerful']);

  const alternates = table.models.filter(m => m.model !== found.model || m.year !== found.year);

  let html = `
    <div class="section-header">IDU — Indoor Unit Result</div>
    <div class="rule-box">
      <strong>IDU Rules:</strong> Green-highlighted features must match while giving alternate model. 
      O = Feature Available &nbsp;|&nbsp; X = Feature Not Available. 
      Ensure same year or newer model. Alternate must have same or more features than original.
      Also check pipe sizes before finalizing.
    </div>
    <div class="found-model-banner">
      <div>
        <div class="found-label">✓ Found — IDU (Indoor Unit)</div>
        <div class="found-model-name">${found.model}</div>
      </div>
      ${badge(found.star, 'badge-star')}
      ${badge(found.tonnage + ' Ton', 'badge-tonnage')}
      ${badge(found.year, 'badge-year')}
      ${badge(found.facia, 'badge-type')}
      ${badge(found.chassis, 'badge-type')}
      ${badge('Pipe: ' + found.pipe_gas + '″ gas / ' + found.pipe_liquid + '″ liquid', 'badge-cabinet-sd')}
    </div>`;

  if (!alternates.length) {
    html += `<div class="no-match">No alternate models found in the same compatibility group.</div>`;
  } else {
    html += `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">
      ${alternates.length} alternate model(s) in same compatibility group. 
      <span style="color:var(--green)">Green border = same/newer year</span> &nbsp;|&nbsp; 
      <span style="color:var(--muted)">Gray border = older year (use cautiously)</span>.
      Ensure highlighted features match.
    </div>`;
    html += `<div class="alternates-grid">`;
    for (const alt of alternates) {
      const yClass = yearClass(found.year, alt.year);
      const featMismatch = [];
      for (const f of IDU_FEATURES) {
        if (HIGHLIGHTED.has(f.key) && found[f.key] === 'O' && alt[f.key] !== 'O') {
          featMismatch.push(f.label);
        }
      }
      const pipeMismatch = (alt.pipe_gas !== found.pipe_gas || alt.pipe_liquid !== found.pipe_liquid);
      html += `<div class="alt-card ${yClass}">
        <div class="alt-card-header">
          <div>
            <div class="alt-model-name">${alt.model}</div>
            <div class="alt-odu-name">Series: ${alt.series} &nbsp;|&nbsp; ${alt.facia} / ${alt.chassis}</div>
          </div>
          <span class="year-badge ${yearBadgeClass(yClass)}">${alt.year}</span>
        </div>
        <div class="tags">
          ${badge(alt.star, 'badge-star')}
          ${badge(alt.tonnage + 'T', 'badge-tonnage')}
          ${badge(alt.remocon, 'badge-cabinet-sd')}
          ${alt.air_swing !== 'X' && alt.air_swing ? badge(alt.air_swing, 'badge-type') : ''}
        </div>
        ${pipeMismatch ? `<div style="color:var(--orange);font-size:0.72rem;margin-top:8px;">⚠ Pipe sizes differ: ${alt.pipe_gas}″/${alt.pipe_liquid}″ (original: ${found.pipe_gas}″/${found.pipe_liquid}″)</div>` : `<div style="color:var(--muted);font-size:0.72rem;margin-top:8px;">Pipe: ${alt.pipe_gas}″ gas / ${alt.pipe_liquid}″ liquid ✓</div>`}
        ${featMismatch.length ? `<div style="color:var(--red);font-size:0.72rem;margin-top:4px;">⚠ Missing features: ${featMismatch.join(', ')}</div>` : `<div style="color:var(--green);font-size:0.72rem;margin-top:4px;">✓ All key features match or improved</div>`}
        <div class="features-grid">
          ${IDU_FEATURES.map(f => {
            const isHighlighted = HIGHLIGHTED.has(f.key);
            const val = alt[f.key] === 'O';
            const orig = found[f.key] === 'O';
            const dotClass = isHighlighted ? (val ? 'dot-highlight-yes' : (orig ? 'dot-highlight-no' : 'dot-no')) : (val ? 'dot-yes' : 'dot-no');
            return `<div class="feat-item ${isHighlighted ? 'highlighted' : ''}">
              <div class="feat-dot ${dotClass}"></div>
              <span>${f.label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  section.innerHTML = html;
  return section;
}

// ---- ODU result renderer ----
function renderODUResult(found, table) {
  const section = document.createElement('div');
  section.className = 'result-section';

  const searchedRaw = document.getElementById('searchInput').value.trim().toUpperCase();
  // Determine if user searched by IDU (CS-) or ODU (CU-)
  const searchedByODU = found.odu.toUpperCase() === searchedRaw;
  // Display name and companion depends on search direction
  const foundPrimary = searchedByODU ? found.odu : found.idu;
  const foundCompanion = searchedByODU ? found.idu : found.odu;
  const foundPrimaryLabel = searchedByODU ? 'ODU (Outdoor Unit)' : 'IDU (Indoor Unit)';
  const companionLabel = searchedByODU ? 'Paired IDU' : 'Paired ODU';

  const alternates = table.models.filter(m => m.idu !== found.idu || m.odu !== found.odu || m.year !== found.year);

  let html = `
    <div class="section-header">ODU — Outdoor Unit Result</div>
    <div class="rule-box">
      <strong>ODU Rules:</strong> 
      (1) While selecting alternate, ensure selected model is same year or newer.<br>
      (2) SD (Super Dyma) ODU can be alternate to PCM ODU, but PCM ODU is NOT alternate to SD (Super Dyma).<br>
      (3) Check pipe sizes (Gas/Liquid) before finalizing.
    </div>
    <div class="found-model-banner">
      <div>
        <div class="found-label">✓ Found — ${foundPrimaryLabel}</div>
        <div class="found-model-name">${foundPrimary}</div>
        <div class="alt-odu-name" style="color:#94a3b8;margin-top:2px;">${companionLabel}: ${foundCompanion}</div>
      </div>
      ${badge(found.star, 'badge-star')}
      ${badge(found.tonnage + ' Ton', 'badge-tonnage')}
      ${badge(found.year, 'badge-year')}
      ${cabinetBadge(found.cabinet)}
      ${badge('Kit: ' + found.kit, found.kit === 'O' ? 'badge-type' : 'badge-year')}
      ${badge('Gas: ' + found.pipe_gas + '″', 'badge-cabinet-sd')}
      ${badge('Liquid: ' + found.pipe_liquid + '″', 'badge-cabinet-sd')}
    </div>`;

  if (!alternates.length) {
    html += `<div class="no-match">No alternate ODU models found in the same compatibility group.</div>`;
  } else {
    html += `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">${alternates.length} alternate(s) found. PCM ↔ SD rules apply. Check pipe sizes.</div>`;
    html += `<div class="alternates-grid">`;
    for (const alt of alternates) {
      const yClass = yearClass(found.year, alt.year);
      const cabOK = !(found.cabinet === 'SD' && alt.cabinet === 'PCM'); // PCM not alternate to SD
      const pipeMismatch = (alt.pipe_gas !== found.pipe_gas || alt.pipe_liquid !== found.pipe_liquid);
      // Show same direction as search: if user searched ODU, show ODU names; if IDU, show IDU names
      const altPrimary = searchedByODU ? alt.odu : alt.idu;
      const altCompanion = searchedByODU ? alt.idu : alt.odu;
      html += `<div class="alt-card ${yClass}">
        <div class="alt-card-header">
          <div>
            <div class="alt-model-name">${altPrimary}</div>
            <div class="alt-odu-name">${companionLabel}: ${altCompanion}</div>
          </div>
          <span class="year-badge ${yearBadgeClass(yClass)}">${alt.year}</span>
        </div>
        <div class="tags">
          ${badge(alt.star, 'badge-star')}
          ${badge(alt.tonnage + 'T', 'badge-tonnage')}
          ${cabinetBadge(alt.cabinet)}
          ${badge('Kit: ' + alt.kit, alt.kit === 'O' ? 'badge-type' : 'badge-year')}
          ${badge('AutoClean: ' + alt.auto_cleaning, alt.auto_cleaning === 'O' ? 'badge-type' : 'badge-year')}
        </div>
        <div class="pipe-info">
          <span>Gas: ${alt.pipe_gas}"</span>
          <span>Liquid: ${alt.pipe_liquid}"</span>
          ${pipeMismatch ? `<span style="color:var(--orange)">⚠ Pipe diff from original</span>` : `<span style="color:var(--green)">✓ Pipe match</span>`}
        </div>
        ${!cabOK ? `<div style="color:var(--red);font-size:0.72rem;margin-top:8px;">⛔ Cannot use: PCM ODU is NOT alternate to SD (Super Dyma)</div>` : ''}
        ${yClass === 'older' ? `<div style="color:var(--orange);font-size:0.72rem;margin-top:4px;">⚠ Older year model — prefer same or newer</div>` : `<div style="color:var(--green);font-size:0.72rem;margin-top:4px;">✓ Year OK</div>`}
      </div>`;
    }
    html += `</div>`;
  }

  section.innerHTML = html;
  return section;
}

// ---- WAC result renderer ----
function renderWACResult(found, table) {
  const section = document.createElement('div');
  section.className = 'result-section';

  const alternates = table.models.filter(m => m.model !== found.model || m.year !== found.year);

  let html = `
    <div class="section-header">WAC — Window Air Conditioner Result</div>
    <div class="rule-box">
      <strong>WAC Rules:</strong> Models within each table are compatible with each other. 
      Feature matching required while giving alternate. Ensure same year or newer model.
    </div>
    <div class="found-model-banner">
      <div>
        <div class="found-label">✓ Found — WAC (Window AC)</div>
        <div class="found-model-name">${found.model}</div>
      </div>
      ${badge(found.star, 'badge-star')}
      ${badge(found.tonnage + ' Ton', 'badge-tonnage')}
      ${badge(found.year, 'badge-year')}
      ${badge(found.category, 'badge-type')}
    </div>`;

  if (!alternates.length) {
    html += `<div class="no-match">No alternate WAC models found in the same compatibility group.</div>`;
  } else {
    html += `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">${alternates.length} alternate(s) found in same WAC group.</div>`;
    html += `<div class="alternates-grid">`;
    for (const alt of alternates) {
      const yClass = yearClass(found.year, alt.year);
      html += `<div class="alt-card ${yClass}">
        <div class="alt-card-header">
          <div>
            <div class="alt-model-name">${alt.model}</div>
            <div class="alt-odu-name">Series: ${alt.series} &nbsp;|&nbsp; ${alt.category}</div>
          </div>
          <span class="year-badge ${yearBadgeClass(yClass)}">${alt.year}</span>
        </div>
        <div class="tags">
          ${badge(alt.star, 'badge-star')}
          ${badge(alt.tonnage + 'T', 'badge-tonnage')}
        </div>
        ${yClass === 'older' ? `<div style="color:var(--orange);font-size:0.72rem;margin-top:8px;">⚠ Older year model</div>` : `<div style="color:var(--green);font-size:0.72rem;margin-top:8px;">✓ Year OK</div>`}
      </div>`;
    }
    html += `</div>`;
  }

  section.innerHTML = html;
  return section;
}
</script>
</body>
</html>
